name: Release to Clojars

on:
  push:
    tags:
      - "v*"

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4

      - uses: actions/setup-java@c1e323688fd81a25caa38c78aa6df2d33d3e20d9 # v4
        with:
          distribution: temurin
          java-version: "21"

      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - uses: DeLaGuardo/setup-clojure@ada62bb3282a01a296659d48378b812b8e097360 # 13.2
        with:
          cli: latest

      - name: Cache Clojure deps
        uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830 # v4
        with:
          path: |
            ~/.m2/repository
            ~/.gitlibs
            ~/.deps.clj
          key: ${{ runner.os }}-clj-${{ hashFiles('deps.edn', 'build.clj') }}
          restore-keys: |
            ${{ runner.os }}-clj-

      - name: Verify tag matches build.clj version
        run: |
          TAG="${GITHUB_REF_NAME#v}"
          BUILD_VERSION=$(grep -E '^\(def version "' build.clj | sed -E 's/^\(def version "([^"]+)".*/\1/')
          if [ "$TAG" != "$BUILD_VERSION" ]; then
            echo "::error::Tag ($TAG) does not match build.clj version ($BUILD_VERSION). Bump build.clj first."
            exit 1
          fi
          echo "Tag $TAG matches build.clj version $BUILD_VERSION ✓"

      - name: Run tests
        run: clojure -M:test

      - name: Deploy to Clojars
        env:
          CLOJARS_USERNAME: ${{ secrets.CLOJARS_USERNAME }}
          CLOJARS_PASSWORD: ${{ secrets.CLOJARS_PASSWORD }}
        run: clojure -T:build deploy
